services:
  - type: web
    name: shl-assessment-recommender-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
